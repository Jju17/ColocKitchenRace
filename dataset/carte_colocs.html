*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:#f7f5f0}
#map{width:100%;height:100%;z-index:1}

.header-bar{
  position:fixed;top:0;left:0;right:0;z-index:1000;
  display:flex;align-items:center;gap:16px;
  padding:14px 24px;
  background:rgba(255,255,255,0.88);

}
.header-bar h1{
  font-family:'Playfair Display',serif;
  font-size:22px;font-weight:700;

}
.header-bar .badge{
  background:#d95030;color:#fff;
  font-size:12px;font-weight:700;
  padding:4px 10px;border-radius:20px;
}
.header-bar .search-box{margin-left:auto;position:relative}
.header-bar input{
  background:rgba(0,0,0,0.04);border:1px solid rgba(0,0,0,0.1);
  border-radius:8px;color:#1a1a1a;padding:8px 14px 8px 36px;
  font-family:'DM Sans',sans-serif;font-size:14px;width:240px;
  outline:none;transition:all .2s;
}
.header-bar input::placeholder{color:rgba(0,0,0,0.35)}
.header-bar input:focus{border-color:rgba(217,80,48,0.5);background:rgba(0,0,0,0.06);width:300px}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:rgba(0,0,0,0.3);font-size:14px;pointer-events:none}

.info-card{
  position:fixed;bottom:24px;left:24px;z-index:1000;
  background:rgba(255,255,255,0.92);backdrop-filter:blur(20px);
  border:1px solid rgba(0,0,0,0.08);border-radius:14px;padding:16px 20px;
  color:#1a1a1a;max-width:280px;box-shadow:0 4px 24px rgba(0,0,0,0.08);
  transform:translateY(120%);opacity:0;transition:all .35s cubic-bezier(.22,1,.36,1);
}
.info-card.visible{transform:translateY(0);opacity:1}
.info-card .coloc-name{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;margin-bottom:4px}
.info-card .coloc-id{font-size:12px;color:rgba(0,0,0,0.4);letter-spacing:0.06em;text-transform:uppercase}
.info-card .coords{font-size:12px;color:rgba(0,0,0,0.3);margin-top:8px;font-variant-numeric:tabular-nums}

.marker-cluster-small,.marker-cluster-medium,.marker-cluster-large{background:rgba(217,80,48,0.15)!important}
.marker-cluster-small div,.marker-cluster-medium div,.marker-cluster-large div{
  background:#d95030!important;color:#fff!important;font-family:'DM Sans',sans-serif!important;font-weight:700!important;font-size:13px!important;
}

.leaflet-popup-content-wrapper{
  background:rgba(255,255,255,0.95)!important;border:1px solid rgba(0,0,0,0.08)!important;
  border-radius:10px!important;color:#1a1a1a!important;font-family:'DM Sans',sans-serif!important;
  box-shadow:0 4px 20px rgba(0,0,0,0.1)!important;
}
.leaflet-popup-tip{background:rgba(255,255,255,0.95)!important}
.leaflet-popup-content{margin:10px 14px!important;font-size:14px}

.search-results{
  position:fixed;top:56px;right:24px;z-index:1001;
  background:rgba(255,255,255,0.95);backdrop-filter:blur(20px);
  border:1px solid rgba(0,0,0,0.08);border-radius:10px;
  max-height:300px;overflow-y:auto;width:300px;display:none;
  box-shadow:0 4px 20px rgba(0,0,0,0.08);
}
.search-results.visible{display:block}
.search-result-item{padding:10px 16px;cursor:pointer;border-bottom:1px solid rgba(0,0,0,0.05);color:#1a1a1a;font-size:13px;transition:background .15s}
.search-result-item:hover{background:rgba(217,80,48,0.08)}
.search-result-item:last-child{border-bottom:none}
.search-result-item .sr-id{color:rgba(0,0,0,0.3);font-size:11px;margin-left:6px}
</style>
</head>

{id:200,name:"Les argilleux",lat:50.8399862,lng:4.4675678},
{id:201,name:"La pièce",lat:50.8363106,lng:4.4110272},
{id:202,name:"Le petit suisse",lat:50.8177817,lng:4.3861569},
{id:203,name:"Le KOAT",lat:50.8260642,lng:4.3594883},
{id:204,name:"la Guinguette",lat:50.8489835,lng:4.4196427},
{id:205,name:"Le K",lat:50.8335591,lng:4.3624196},
{id:206,name:"La fresque",lat:50.8356216,lng:4.4183295},
{id:207,name:"La Brique",lat:50.8195964,lng:4.3761127},
{id:208,name:"casa auderghem",lat:50.8353922,lng:4.3877557},
{id:209,name:"Le Moulin Rouge",lat:50.8194716,lng:4.3847146},
{id:210,name:"Les copains d’abord",lat:50.8408983,lng:4.4290496},
];

  const map = L.map('map').setView([50.837,4.400],13);

  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom:19
  }).addTo(map);

  const markerIcon = L.divIcon({
    className:'',
    html:'<svg width="28" height="36" viewBox="0 0 28 36" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M14 0C6.268 0 0 6.268 0 14c0 10.5 14 22 14 22s14-11.5 14-22C28 6.268 21.732 0 14 0z" fill="#d95030"/><circle cx="14" cy="13" r="5.5" fill="#fff" fill-opacity="0.9"/></svg>',
    iconSize:[28,36],iconAnchor:[14,36],popupAnchor:[0,-36]
  });

  const markers = L.markerClusterGroup({maxClusterRadius:45,spiderfyOnMaxZoom:true,showCoverageOnHover:false,zoomToBoundsOnClick:true});
  const markerMap = {};

  colocs.forEach(c => {
    const m = L.marker([c.lat,c.lng],{icon:markerIcon});
    m.bindPopup('<strong>'+c.name+'</strong><br><span style="opacity:.45;font-size:12px">#'+c.id+' — '+c.lat.toFixed(5)+', '+c.lng.toFixed(5)+'</span>');
    m.on('click',function(){showInfo(c)});
    markers.addLayer(m);
    markerMap[c.id] = m;
  });
  map.addLayer(markers);

  const infoCard = document.getElementById('infoCard');
  function showInfo(c){
    document.getElementById('infoId').textContent = 'COLOC #'+c.id;
    document.getElementById('infoName').textContent = c.name;
    document.getElementById('infoCoords').textContent = c.lat.toFixed(6)+', '+c.lng.toFixed(6);
    infoCard.classList.add('visible');
    clearTimeout(window._hideInfo);
    window._hideInfo = setTimeout(function(){infoCard.classList.remove('visible')},5000);
  }

  var searchInput = document.getElementById('search');
  var searchResults = document.getElementById('searchResults');
  searchInput.addEventListener('input',function(){
    var q = this.value.toLowerCase().trim();
    if(q.length<2){searchResults.classList.remove('visible');return;}
    var matches = colocs.filter(function(c){return c.name.toLowerCase().indexOf(q)!==-1}).slice(0,15);
    if(!matches.length){searchResults.classList.remove('visible');return;}
    searchResults.innerHTML = matches.map(function(c){
      return '<div class="search-result-item" data-id="'+c.id+'">'+c.name+'<span class="sr-id">#'+c.id+'</span></div>';
    }).join('');
    searchResults.classList.add('visible');
  });
  searchResults.addEventListener('click',function(e){
    var item = e.target.closest('.search-result-item');
    if(!item) return;
    var id = +item.dataset.id;
    var c = colocs.find(function(x){return x.id===id});
    if(!c) return;
    map.setView([c.lat,c.lng],17);
    var m = markerMap[id];
    if(m){markers.zoomToShowLayer(m,function(){m.openPopup()})}
    showInfo(c);
    searchResults.classList.remove('visible');
    searchInput.value = c.name;
  });
  document.addEventListener('click',function(e){
    if(!e.target.closest('.search-box')&&!e.target.closest('.search-results'))
      searchResults.classList.remove('visible');
  });
}

  var s1 = document.createElement('script');
  s1.src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
  s1.onload=function(){
    var s2 = document.createElement('script');
    s2.src='https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js';
    s2.onload=initApp;
    document.head.appendChild(s2);
  };
  document.head.appendChild(s1);
})();
</script>
